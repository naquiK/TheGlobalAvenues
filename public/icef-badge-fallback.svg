<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 320" role="img" aria-labelledby="title desc">
  <title id="title">ICEF Accredited Badge</title>
  <desc id="desc">Fallback visual for ICEF accreditation badge.</desc>
  <defs>
    <linearGradient id="outer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22305f" />
